####### DGF (Deep Geometry Framework) parameter file for EFTCAMB #######
#
# DGF maps to Reparametrized Horndeski (RPH) via:
#   alpha_M = 0  (no running Planck mass — G4 = 1/2 constant)
#   alpha_T = 0  (no tensor speed excess — GW170817 safe)
#   alpha_B ~ braiding from torsion, peak value ~ 0.17 at z=0
#   alpha_K ~ kinetic term, value ~ 1
#
# c = phi = 1.618034, H0 = 72.1 km/s/Mpc
#######################################################################

####### EFT mode: RPH (Reparametrized Horndeski) #######

EFTflag = 2
AltParEFTmodel = 1

# w_DE: DGF produces dynamical dark energy but we start with w=-1
# as a first approximation (background fixed, perturbations modified)
EFTwDE = 0

####### RPH model selection #######
# alpha_M = 0: no running Planck mass
RPHmassPmodel = 0

# alpha_K: constant model (approximate)
RPHkineticitymodel = 1

# alpha_B: linear model — braiding grows from 0 then peaks
# alpha_B(a) = alpha_B0 * a  approximates the rolling phase
RPHbraidingmodel = 1

# alpha_T = 0: no tensor speed excess (GW170817 safe)
RPHtensormodel = 0

####### Stability flags #######
EFT_mathematical_stability = F
EFT_ghost_stability = T
EFT_gradient_stability = T
EFT_mass_stability = F
EFT_additional_priors = T

####### RPH parameter values for DGF #######

# alpha_M = 0 (no running Planck mass)
RPHmassP0        = 0.0
RPHmassPexp      = 0.0

# alpha_K ~ 1 (canonical kinetic term from G2 = F0*X)
# F0 = 3*phi*(phi-ln(phi)) = 5.5183
# alpha_K = 2*F0*X/M^2 ~ 1 in standard normalisation
RPHkineticity0   = 1.0
RPHkineticityexp = 0.0

# alpha_B: braiding from torsion
# alpha_B = n_dot / ((c-ln_phi)*H) = n_dot / (1.1368*H)
# At z=0: n_dot ~ 0.08*H0, so alpha_B(z=0) ~ 0.07
# Linear model: alpha_B(a) = alpha_B0 * a
# alpha_B0 ~ 0.17 gives peak consistent with hi_class run 03
RPHbraiding0     = 0.09
RPHbraidingexp   = 0.0

# alpha_T = 0 (GW170817)
RPHtensor0       = 0.0
RPHtensorexp     = 0.0

EFTCAMB_turn_on_time = 0.3

####### Standard cosmological parameters #######
# H0 = 72.1 km/s/Mpc (DGF preferred value at c=phi)
# Using CAMB convention: H0 in km/s/Mpc

DEFAULT(inifiles/params.ini)

hubble = 72.1
ombh2  = 0.02237
omch2  = 0.1200
omk    = 0
mnu    = 0.06
tau    = 0.0544
As     = 2.1e-9
ns     = 0.965

####### Output settings #######
output_root = dgf_eftcamb_output

# Matter power spectrum at multiple redshifts
transfer_num_redshifts = 7
transfer_redshift(1) = 2.0
transfer_redshift(2) = 1.5
transfer_redshift(3) = 1.0
transfer_redshift(4) = 0.7
transfer_redshift(5) = 0.5
transfer_redshift(6) = 0.3
transfer_redshift(7) = 0.0

transfer_power_var = 7
get_transfer = T

# CMB power spectra
get_scalar_cls = T
get_vector_cls = F
get_tensor_cls = F
get_lensing_cls = T

l_max_scalar = 3000
k_eta_max_scalar = 6000

do_lensing = T
