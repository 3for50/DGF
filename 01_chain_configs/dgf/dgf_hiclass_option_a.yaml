# DGF hi-class Chain - Option A
# Uses propto_omega gravity model matching HPC configuration
# DOI: 10.5281/zenodo.19060663

# Theory: hi_class with propto_omega
# This matches the working HPC DGF configuration

theory:
  hi_class_DGF.hi_class_DGF:
    python_path: /home/joe-research/cobaya-dgf
    extra_args:
      # Gravity sector - propto_omega (matching HPC)
      gravity_model: propto_omega
      expansion_model: lcdm
      expansion_smg: 0.5
      parameters_smg: "0.1, 0.1, 0.0, 0.0, 1.0"
      
      # DGF dark energy sector
      Omega_Lambda: 0
      Omega_fld: 0
      Omega_smg: -1
      
      # Output options
      output: tCl,pCl,lCl,mPk
      l_max_scalars: 2508
      lensing: yes
      
      # Redshifts for P(k)
      z_pk: 0, 0.3, 0.5, 0.7, 1.0, 1.5, 2.0
      P_k_max_h/Mpc: 10
      
      # Fixed parameters (matching HPC)
      Omega_k: 0
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      recombination: recfast
      YHe: 0.2454
      
      # Verbosity
      background_verbose: 0
      thermodynamics_verbose: 0
      perturbations_verbose: 0
      spectra_verbose: 0

# Likelihoods
likelihood:
  # Planck 2018 lite (CMB)
  planck_2018_highl_plik.TT_lite: null
  planck_2018_lowl.TT: null

# Parameters to constrain
# These vary within the fixed DGF background
params:
  # Standard cosmological params (vary freely)
  omega_b:
    prior:
      min: 0.019
      max: 0.026
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.001
    proposal: 0.0001
    latex: \omega_b
  
  omega_cdm:
    prior:
      min: 0.08
      max: 0.20
    ref:
      dist: norm
      loc: 0.12
      scale: 0.01
    proposal: 0.001
    latex: \omega_{\rm cdm}
  
  h:
    prior:
      min: 0.60
      max: 0.80
    ref:
      dist: norm
      loc: 0.721
      scale: 0.01
    proposal: 0.005
    latex: h
  
  logA:
    prior:
      min: 2.5
      max: 3.5
    ref:
      dist: norm
      loc: 3.04
      scale: 0.05
    proposal: 0.01
    latex: \ln(10^{10}A_s)
  
  n_s:
    prior:
      min: 0.90
      max: 1.10
    ref:
      dist: norm
      loc: 0.965
      scale: 0.01
    proposal: 0.005
    latex: n_s
  
  tau_reio:
    prior:
      min: 0.01
      max: 0.15
    ref:
      dist: norm
      loc: 0.054
      scale: 0.01
    proposal: 0.005
    latex: \tau_{\rm reio}

# Sampler
sampler:
  mcmc:
    # Target samples
    max_samples: 10000
    
    # Proposal learning
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    
    # Burn-in
    burn_in: 500
    
    # Output
    output_every: 500
    
    # Seed for reproducibility
    seed: 42
    
    # R-hat convergence
    Rminus1_stop: 0.01

# Output
output: /home/joe-research/chains/dgf_hiclass_option_a
force: true

# Packages path for likelihoods
packages_path: /home/joe-research/dgf_data
