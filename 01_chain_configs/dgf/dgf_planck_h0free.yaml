# ============================================================
# DGF Planck CMB — H0 Free
# THE DECISIVE TEST: Does DGF braiding shift CMB-inferred H0?
# Uses plik_lite TTTEEE + hi_class with tabulated_alphas
# ============================================================

theory:
  classy:
    path: /home/joe-research/hi_class
    ignore_obsolete: true
    extra_args:
      gravity_model: tabulated_alphas
      alpha_functions_file: /home/joe-research/hi_class/dgf_background_alphas_tabfmt.dat
      Omega_smg: -1
      expansion_model: wowa
      expansion_smg: '0.685, -0.933, 0.'
      Omega_fld: 0
      Omega_Lambda: 0
      skip_stability_tests_smg: 'yes'
      kineticity_safe_smg: 1e-4
      cs2_safe_smg: 1e-4
      N_ur: 2.0328
      N_ncdm: 1
      m_ncdm: 0.06
      T_ncdm: 0.71611

likelihood:
  planck_2018_highl_plik.TTTEEE_lite: null
  planck_2018_lowl.TT_clik: null
  planck_2018_lowl.EE_clik: null

params:
  # ── Free ──────────────────────────────────────────────
  H0:
    prior: {min: 55.0, max: 85.0}
    ref:   {dist: norm, loc: 72.1, scale: 3.0}
    proposal: 1.0
    latex: H_0

  omega_cdm:
    prior: {min: 0.01, max: 0.99}
    ref:   {dist: norm, loc: 0.12, scale: 0.01}
    proposal: 0.002
    latex: \omega_{\rm cdm}

  ln10A_s:
    prior: {min: 2.0, max: 4.0}
    ref:   {dist: norm, loc: 3.044, scale: 0.05}
    proposal: 0.02
    latex: \ln(10^{10} A_s)

  # ── Fixed DGF ─────────────────────────────────────────
  omega_b:  {value: 0.02238280}
  n_s:      {value: 0.9660499}
  tau_reio: {value: 0.054}

  # ── Derived ───────────────────────────────────────────
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_m
  S8:
    derived: "lambda sigma8, Omega_m: sigma8 * (Omega_m/0.3)**0.5"
    latex: S_8

sampler:
  mcmc:
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    max_samples: 30000
    max_tries: 100000
    Rminus1_stop: 0.02
    Rminus1_cl_stop: 0.2
    seed: 48
    output_every: 120s
    learn_every: 40d

output: /home/joe-research/chains/dgf_planck_h0free
packages_path: /home/joe-research/dgf_data
