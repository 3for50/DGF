# ============================================================
# DGF — KiDS-1000 Only Chain (for S8 tension measurement)
# No BAO to avoid distance-tension contamination
# ============================================================

theory:
  dgf_cosmopower_theory.DGFCosmoPower:
    python_path: /home/joe-research/dgf_training

likelihood:
  kids1000_cobaya.KiDS1000:
    python_path: /home/joe-research/dgf_training
    data_directory: /home/joe-research/montepython_gpu/data/KiDS-1000

params:
  # ── Cosmological (free) ──────────────────────────────
  omega_cdm:
    prior: {min: 0.01, max: 0.99}
    ref:   {dist: norm, loc: 0.1678, scale: 0.01}
    proposal: 0.002
    latex: \omega_{\rm cdm}

  ln10A_s:
    prior: {min: 2.0, max: 4.0}
    ref:   {dist: norm, loc: 2.294, scale: 0.05}
    proposal: 0.020
    latex: \ln(10^{10} A_s)

  # ── Nuisance (free) ──────────────────────────────────
  A_bary:
    prior: {min: 0.0, max: 10.0}
    ref:   {dist: norm, loc: 0.59, scale: 0.5}
    proposal: 0.5
    latex: A_{\rm bary}

  A_IA:
    prior: {min: -6.0, max: 6.0}
    ref:   {dist: norm, loc: 1.81, scale: 0.5}
    proposal: 0.5
    latex: A_{\rm IA}

  # ── Fixed DGF cosmology ───────────────────────────────
  omega_b:  {value: 0.02238280}
  n_s:      {value: 0.9660499}
  tau_reio: {value: 0.054}
  H0:       {value: 72.1,  latex: H_0}

  # ── Derived ───────────────────────────────────────────
  sigma8:
    derived: true
    latex: \sigma_8
  Omega_m:
    derived: true
    latex: \Omega_m
  S8:
    derived: "lambda sigma8, Omega_m: sigma8 * (Omega_m/0.3)**0.5"
    latex: S_8

sampler:
  mcmc:
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    max_samples: 30000
    max_tries: 100000
    Rminus1_stop: 0.01
    Rminus1_cl_stop: 0.2
    seed: 43
    output_every: 60s
    learn_every: 40d

output: /home/joe-research/chains/dgf_kids_only
packages_path: /home/joe-research/dgf_data
